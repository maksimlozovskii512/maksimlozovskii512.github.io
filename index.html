<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maksim Lozovskii</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 56.25rem;
      margin: auto;
      padding: 2.5rem 1.25rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.625rem;
    }

    p {
      color: #94a3b8;
    }

    .links {
      margin-top: 1.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.9375rem;
    }

    .card {
      background: #1e293b;
      padding: 1.25rem;
      border-radius: 0.75rem;
      text-decoration: none;
      color: #e2e8f0;
      transition: transform 0.2s, background 0.2s;
    }

    .card:hover {
      transform: translateY(-0.25rem);
      background: #334155;
    }

    .footer {
      margin-top: 3.125rem;
      font-size: 0.9rem;
      color: #64748b;
    }

    /* projects */
    .projects {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .project-card {
      background: #1e293b;
      border-radius: 0.75rem;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, background 0.2s;
    }

    .project-card:hover {
      transform: translateY(-0.25rem);
      background: #334155;
    }

    .project-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .project-content {
      padding: 0.9rem;
    }

    .project-content h3 {
      margin: 0;
      font-size: 1rem;
    }

    .project-content p {
      margin: 0.3rem 0 0;
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const links = [
        {
          title: "GitHub",
          url: "https://github.com/maksimlozovskii512",
          description: "Check out my latest projects"
        },
        {
          title: "LinkedIn",
          url: "https://linkedin.com/in/maksimlozovskii",
          description: "My professional profile"
        },
        {
          title: "Contact",
          url: "mailto:lozovskiimaksim@gmail.com",
          description: "Get in touch"
        }
      ];
      
      const projects = [
        {
          title: "Project One",
          image: "https://placehold.co/600x300/png",
          url: "#",
          description: "Template Description"
        },
        {
          title: "Project Two",
          image: "https://placehold.co/600x300/png",
          url: "#",
          description: "Template Description"
        },
        {
          title: "Project Three",
          image: "https://placehold.co/600x300/png",
          url: "#",
          description: "Template Description"
        },
        {
          title: "Project Four",
          image: "https://placehold.co/600x300/png",
          url: "#",
          description: "Template Description"
        },
        {
          title: "Project Five",
          image: "https://placehold.co/600x300/png",
          url: "#",
          description: "Template Description"
        },
        {
          title: "Project Six",
          image: "https://placehold.co/600x300/png",
          url: "#",
          description: "Template Description"
        }
      ];

      return (
        <div className="container">
          <h1>Hi, I'm Maksim Lozovskii</h1>
          <p>
            I'm a Software Engineer and I love making things any way
          </p>

          <p align="center">
            <a href="https://skillicons.dev">
              <img src="https://skillicons.dev/icons?i=react,nextjs,cs,dotnet,vscode,windows,azure,ubuntu,java,spring,maven,docker,kubernetes,prometheus,grafana,github,jenkins,aws,terraform,mysql,redis,postgresql,powershell,bash,apple,arduino,bootstrap,discord,elasticsearch,fastapi" />
            </a>
          </p>

          <div className="links">
            {links.map((link, index) => (
              <a key={index} href={link.url} className="card" target="_blank" rel="noreferrer">
                <h3>{link.title}</h3>
                <p>{link.description}</p>
              </a>
            ))}
          </div>

          <h1>Projects</h1>

          <div className="projects">
            {projects.map((project, index) => (
              <a key={index} href={project.url} className="project-card" target="_blank" rel="noreferrer">
                <img src={project.image} alt={project.title} />
                <div className="project-content">
                  <h3>{project.title}</h3>
                  <p>{project.description}</p>
                </div>
              </a>
            ))}
          </div>

          <div className="footer">
            © {new Date().getFullYear()} Maksim Lozovskii
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
